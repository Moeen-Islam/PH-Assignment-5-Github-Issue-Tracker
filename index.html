<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Github Issue Tracker | Log In</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />


<!-- Tailwind + DaisyUI  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


  <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100">

  <section class="min-h-screen grid place-items-center px-4 py-8">
    <div class="w-full max-w-[520px] bg-white rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.08)] p-5 sm:p-8">

      <div class="flex flex-col items-center text-center mb-6">
        <img src="./assets/github-logo.png" alt="GitHub Logo" class="mb-5 w-16 sm:w-20" />
        <h1 class="font-semibold text-[#1F2937] text-[22px] sm:text-[24px]">
          GitHub Issues Tracker
        </h1>
        <p class="text-[#64748B] text-sm sm:text-base mt-1">
          Sign in to manage your issues
        </p>
      </div>

      <form id="loginForm" class="w-full" novalidate>
        <div class="mb-4">
          <label for="username" class="block font-bold text-[#1F2937] text-[15px] sm:text-[16px] mb-2">
            Username
          </label>
          <input type="text" id="username" placeholder="Enter Username" class="w-full px-4 py-3 border border-gray-300 rounded-lg placeholder:text-gray-400 focus:outline-none"/>
          <p id="usernameError" class="text-red-500 text-sm mt-2 hidden"></p>
          <p class="text-[#4A00FF] text-[13px] sm:text-[14px] mt-2">Default: admin</p>
        </div>

        <div class="mb-6">
          <label for="password" class="block font-bold text-[#1F2937] text-[15px] sm:text-[16px] mb-2">
            Password
          </label>
          <input type="password" id="password" placeholder="Enter Password" class="w-full px-4 py-3 border border-gray-300 rounded-lg placeholder:text-gray-400 focus:outline-none"/>
          <p id="passwordError" class="text-red-500 text-sm mt-2 hidden"></p>
          <p class="text-[#4A00FF] text-[13px] sm:text-[14px] mt-2">Default: admin123</p>
        </div>

        <p id="loginError" class="text-red-500 text-sm mb-4 hidden"></p>

        <button type="submit" class="w-full bg-[#4A00FF] hover:bg-[#3d00d6] text-white font-semibold py-3 rounded-lg transition mb-4 cursor-pointer">
          Sign In
        </button>
      </form>

      <div class="flex justify-center items-center gap-3 w-full py-5">
        <hr class="border border-[#E4E4E7] w-full" />
        <p class="text-sm text-[#64748B]">OR</p>
        <hr class="border border-[#E4E4E7] w-full" />
      </div>

      <div class="text-center">
        <p class="text-[14px] text-[#64748B] mb-2">Demo Credentials:</p>
        <div class="py-3 text-sm sm:text-base">
          <p>
            <span class="font-bold">Username:</span> admin
            <br />
            <span class="font-bold">Password:</span> admin123
          </p>
        </div>
      </div>

    </div>
  </section>

  <script src="./script.js"></script>
</body>
</html>
